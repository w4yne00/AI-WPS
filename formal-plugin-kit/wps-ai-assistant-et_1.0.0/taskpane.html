<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS AI 助理 - 智能分析</title>
    <link rel="stylesheet" href="./taskpane.css?v=0.18.0-alpha" />
  </head>
  <body data-task-mode="excelAnalysis">
    <div class="app">
      <header class="header">
        <div class="header-copy">
          <p class="eyebrow">WPS AI 助理</p>
          <h1 id="task-title">智能分析</h1>
        </div>
        <div id="top-toolbox" class="header-actions">
          <button id="btn-open-settings" class="icon-button" type="button" title="打开设置" aria-label="打开设置">
            <img class="settings-icon" src="./assets/icon-settings.png" alt="" />
            <span class="back-icon" aria-hidden="true">←</span>
          </button>
          <div id="health-indicator" class="badge badge-warn" aria-live="polite">检测中</div>
        </div>
      </header>

      <section id="home-view" class="view active">
        <section id="scope-strip" class="scope-strip">
          <span class="scope-pill-label">识别范围</span>
          <strong id="scope-line">未检测</strong>
        </section>

        <section id="workflow-profile-strip" class="workflow-profile-strip" aria-label="当前工作流">
          <label for="workflow-profile-select">工作流</label>
          <select id="workflow-profile-select" aria-label="选择智能分析工作流">
            <option value="">正在读取...</option>
          </select>
          <span id="workflow-switch-feedback" class="inline-status" aria-live="polite">未检测</span>
        </section>

        <section class="controls glass-card">
          <div id="excel-analysis-options" class="mode-block">
            <div id="excel-range-summary" class="excel-range-summary">等待读取表格范围。</div>
            <label class="field" for="excel-analysis-requirement">
              <span>分析要求</span>
              <textarea id="excel-analysis-requirement" rows="4" placeholder="例如：生成经营分析，关注异常波动和后续建议。"></textarea>
            </label>
          </div>

          <div class="button-cluster action-bar single-action">
            <button id="btn-run-primary" type="button">生成分析报告</button>
          </div>
          <div id="status-line" class="sr-only">等待操作。</div>
        </section>

        <section class="panel result-panel glass-card">
          <div class="panel-head">
            <button id="btn-copy-result" class="ghost-action copy-button" type="button" title="复制结果" aria-label="复制结果">复制</button>
            <div>
              <h2>结果预览</h2>
              <div id="result-view-switch" class="result-view-switch excel-result-switch" hidden>
                <button type="button" id="btn-result-preview" class="view-switch-button active" aria-pressed="true">分析报告</button>
                <button type="button" id="btn-result-plain" class="view-switch-button" aria-pressed="false">汇报段落</button>
              </div>
            </div>
          </div>
          <div id="result-output" class="markdown-output">等待运行。</div>
        </section>
      </section>

      <section id="settings-view" class="view">
        <section class="settings-shell glass-card">
          <div id="settings-status-line" class="settings-status-line" aria-live="polite">等待操作。</div>
          <section id="connection-settings-section" class="settings-group">
            <section class="settings-card">
              <div id="provider-summary-card" class="provider-summary">
                <div class="provider-main">
                  <h4>大模型 API URL</h4>
                  <p id="provider-summary-url">未检测到服务地址</p>
                </div>
                <div class="provider-side">
                  <button id="btn-edit-provider" class="ghost-action mini-button" type="button">编辑</button>
                </div>
              </div>

              <div id="provider-edit-view" class="provider-editor" hidden>
                <label class="field">
                  <span>大模型 API URL</span>
                  <input id="provider-base-url" type="text" placeholder="例如：https://aibot.example.com/v1" />
                </label>

                <div class="button-row settings-actions">
                  <button id="btn-save-provider-url" type="button">保存地址</button>
                  <button id="btn-refresh" class="ghost-action" type="button">刷新配置</button>
                  <button id="btn-back-provider-summary" class="ghost-action" type="button">完成</button>
                </div>
              </div>
            </section>

            <section class="settings-card">
              <section id="workflow-settings-home">
                <div class="workflow-manager-head">
                  <div>
                    <h3 id="workflow-manager-title">工作流</h3>
                    <p id="workflow-manager-summary">正在读取工作流配置...</p>
                  </div>
                  <button id="btn-new-workflow-profile" type="button">新建工作流</button>
                </div>
                <div id="workflow-profile-manager" class="workflow-profile-manager"></div>
              </section>

              <section id="workflow-editor-view" class="workflow-editor-view" hidden>
                <div class="workflow-editor-head">
                  <button id="btn-workflow-editor-back" class="icon-button is-back" type="button" title="返回工作流列表" aria-label="返回工作流列表">
                    <span class="back-icon" aria-hidden="true">←</span>
                  </button>
                  <h3 id="workflow-editor-title">新建工作流</h3>
                </div>
                <label class="field" for="workflow-editor-name">
                  <span>工作流名称</span>
                  <input id="workflow-editor-name" type="text" maxlength="40" />
                </label>
                <label class="field" for="workflow-editor-note">
                  <span>工作流备注</span>
                  <textarea id="workflow-editor-note" rows="3" maxlength="200" placeholder="选填"></textarea>
                </label>
                <label class="field" for="workflow-editor-key">
                  <span id="workflow-editor-key-label">API Key</span>
                  <input id="workflow-editor-key" type="password" autocomplete="off" />
                </label>
                <p id="workflow-editor-key-status" class="inline-status"></p>
                <label class="workflow-activate-check" for="workflow-editor-activate">
                  <input id="workflow-editor-activate" type="checkbox" />
                  <span>保存并设为当前</span>
                </label>
                <div id="workflow-editor-error" class="workflow-profile-error" role="alert"></div>
                <div class="workflow-editor-actions">
                  <button id="btn-cancel-workflow-editor" class="ghost-action" type="button">取消</button>
                  <button id="btn-save-workflow-editor" type="button">保存</button>
                </div>
              </section>

              <section id="workflow-delete-dialog" class="workflow-delete-dialog" role="dialog" aria-modal="true" aria-labelledby="workflow-delete-title" hidden>
                <div class="workflow-delete-dialog-panel">
                  <h3 id="workflow-delete-title">删除工作流</h3>
                  <p>确认删除“<strong id="workflow-delete-name"></strong>”？删除后无法恢复其 Key。</p>
                  <div class="workflow-editor-actions">
                    <button id="btn-cancel-workflow-delete" class="ghost-action" type="button">取消</button>
                    <button id="btn-confirm-workflow-delete" class="danger-action" type="button">删除</button>
                  </div>
                </div>
              </section>
            </section>
          </section>

          <section id="diagnostics-section" class="settings-group">
            <section class="settings-card">
              <div class="settings-card-head">
                <h4>联调状态</h4>
                <span class="inline-status" id="settings-provider-line">接口：未检测</span>
              </div>

              <div class="diag-grid">
                <div class="diag-item">
                  <span class="diag-label">追踪号</span>
                  <strong id="trace-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">识别范围</span>
                  <strong id="settings-scope-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">接口状态</span>
                  <strong id="provider-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">前端版本</span>
                  <strong id="frontend-version-line">未检测</strong>
                </div>
              </div>
            </section>

            <section id="last-task-diagnostics-card" class="settings-card diagnostics-card">
              <div class="settings-card-head">
                <h4>最近一次任务诊断</h4>
                <span class="inline-status">脱敏摘要</span>
              </div>
              <div class="button-row diagnostics-actions">
                <button id="btn-refresh-diagnostics" class="ghost-action" type="button">刷新诊断</button>
                <button id="btn-copy-diagnostics" class="ghost-action" type="button">复制诊断信息</button>
              </div>
              <div id="last-task-diagnostics-output" class="markdown-output diagnostics-output">尚未刷新诊断。</div>
            </section>
          </section>
        </section>
      </section>
    </div>
    <script src="./taskpane-helpers.js?v=0.18.0-alpha"></script>
    <script src="./taskpane.js?v=0.18.0-alpha"></script>
  </body>
</html>
