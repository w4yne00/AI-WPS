<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS AI 助理</title>
    <link rel="stylesheet" href="./taskpane.css?v=0.12.10-alpha" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-copy">
          <p class="eyebrow">WPS AI 助理</p>
          <h1 id="task-title">智能编写</h1>
        </div>
        <div id="top-toolbox" class="header-actions">
          <div id="health-indicator" class="badge badge-warn">检测中</div>
        </div>
      </header>

      <section id="home-view" class="view active">
        <section id="scope-strip" class="scope-strip">
          <span class="scope-pill-label">识别范围</span>
          <strong id="scope-line">未检测</strong>
        </section>

        <section class="controls glass-card">
          <div id="rewrite-options" class="mode-block">
            <div class="rewrite-grid">
              <label class="field">
                <span>编写动作</span>
                <select id="write-action">
                  <option value="rewrite">改写润色</option>
                  <option value="continue">续写扩展</option>
                  <option value="summarize">提炼总结</option>
                  <option value="custom">自定义</option>
                </select>
              </label>

              <label class="field">
                <span id="style-field-label">表达风格</span>
                <select id="rewrite-style">
                  <option value="standard">技术方案正式</option>
                  <option value="structured">条理化说明</option>
                  <option value="reporting">汇报材料风格</option>
                </select>
              </label>

              <label class="field">
                <span>侧重点</span>
                <select id="focus-point">
                  <option value="complete">保持信息完整</option>
                  <option value="conclusion_risk">结论与风险</option>
                  <option value="plan_next">措施与计划</option>
                  <option value="acceptance">验收与闭环</option>
                </select>
              </label>

              <label class="field">
                <span>篇幅</span>
                <select id="length-mode">
                  <option value="same">保持篇幅</option>
                  <option value="concise">精简</option>
                  <option value="expanded">适度扩写</option>
                </select>
              </label>
            </div>
            <div id="rewrite-summary-card" class="rewrite-summary-card" aria-live="polite">
              <span>当前要求</span>
              <strong id="rewrite-summary-text">技术方案正式 / 保持信息完整 / 保持篇幅</strong>
              <p><b>表达风格：</b><em id="rewrite-style-detail">采用国企技术方案常用的正式、准确、克制表达。</em></p>
              <p><b>侧重点：</b><em id="rewrite-focus-detail">保留原文关键信息、事实、条件和结论。</em></p>
              <p><b>篇幅：</b><em id="rewrite-length-detail">保持与原文相近的篇幅。</em></p>
              <p><b>输出：</b><em id="rewrite-output-detail">不要原样返回待处理内容；只输出最终正文。</em></p>
            </div>
          </div>

          <div id="template-options" class="mode-block compact-template" hidden>
            <label class="field">
              <span>文档模板</span>
              <select id="template-select"></select>
            </label>
          </div>

          <div id="fixed-template-options" class="mode-block compact-template" hidden>
            <label class="field">
              <span>标准模板</span>
              <input type="text" value="技术文件格式及书写要求" readonly />
            </label>
          </div>

          <div id="document-review-options" class="mode-block" hidden>
            <label class="field">
              <span>文档类型</span>
              <select id="technical-document-type">
                <option value="technical_solution">技术方案</option>
                <option value="contract_acceptance">合同验收文档</option>
                <option value="test_outline">测试大纲和细则</option>
              </select>
            </label>

            <label class="field review-prompt-field" hidden>
              <span>审查重点提示词</span>
              <textarea id="technical-review-prompt" rows="8"></textarea>
            </label>
          </div>

          <label id="instruction-block" class="field">
            <span id="rewrite-prompt-label">编写要求</span>
            <div id="prompt-fragment-card" class="prompt-fragment-card" hidden>
              <div>
                <b>风格</b>
                <p id="selected-style-prompt">采用国企技术方案常用的正式、准确、克制表达。</p>
              </div>
              <div>
                <b>侧重</b>
                <p id="selected-focus-prompt">保留原文关键信息、事实、条件和结论。</p>
              </div>
              <div>
                <b>篇幅</b>
                <p id="selected-length-prompt">保持与原文相近的篇幅。</p>
              </div>
              <div>
                <b>输出</b>
                <p id="selected-output-prompt">不要原样返回待处理内容；只输出最终正文。</p>
              </div>
            </div>
            <textarea id="user-instruction" rows="2" placeholder="补充要求：请突出风险和下一步计划，压缩到200字以内。"></textarea>
          </label>

          <div class="button-cluster action-bar">
            <button id="btn-run-primary" type="button">生成改写</button>
            <button id="btn-apply" class="secondary-action" type="button" disabled>应用预览</button>
          </div>
          <div id="status-line" class="sr-only">等待操作。</div>
        </section>

        <section class="panel result-panel glass-card">
          <div class="panel-head">
            <button id="btn-copy-result" class="ghost-action copy-button" type="button" title="复制结果" aria-label="复制结果">复制</button>
            <div>
              <h2>结果预览</h2>
            </div>
          </div>
          <div id="result-output" class="markdown-output">等待运行。</div>
        </section>
      </section>

      <section id="settings-view" class="view">
        <section class="settings-shell glass-card">
          <section id="connection-settings-section" class="settings-group">
            <section class="settings-card">
              <div id="provider-summary-card" class="provider-summary">
                <div class="provider-main">
                  <span id="provider-current-badge" class="provider-badge">当前</span>
                  <h4 id="provider-summary-name">星辰 API</h4>
                  <p id="provider-summary-type">企业大模型服务</p>
                  <p id="provider-summary-url">未检测到服务地址</p>
                  <p id="provider-auth-line">统一密钥：未配置</p>
                </div>
                <div class="provider-side">
                  <button id="btn-edit-provider" class="ghost-action mini-button" type="button">编辑</button>
                </div>
              </div>

              <div id="provider-edit-view" class="provider-editor" hidden>
                <label class="field">
                  <span>模型提供商名称</span>
                  <input id="provider-name" type="text" placeholder="例如：星辰 API" />
                </label>

                <label class="field">
                  <span>大模型 API URL</span>
                  <input id="provider-base-url" type="text" placeholder="例如：https://aibot.example.com/v1" />
                </label>

                <label class="field">
                  <span>统一 Dify Chat API Key</span>
                  <input id="provider-api-key" type="password" placeholder="粘贴统一 Dify Chat API Key" />
                </label>

                <div class="button-row settings-actions">
                  <button id="btn-save-provider-url" type="button">保存地址</button>
                  <button id="btn-save-api-key" type="button">保存密钥</button>
                  <button id="btn-clear-api-key" class="ghost-action" type="button">清除密钥</button>
                  <button id="btn-refresh" class="ghost-action" type="button">刷新配置</button>
                  <button id="btn-back-provider-summary" class="ghost-action" type="button">完成</button>
                </div>
              </div>
            </section>

            <section class="settings-card">
              <div class="settings-card-head">
                <h4>任务级 API Key</h4>
                <span class="inline-status">未配置时使用统一密钥</span>
              </div>
              <div id="task-api-key-list" class="task-routes-list"></div>
            </section>
          </section>

          <section id="diagnostics-section" class="settings-group">
            <section class="settings-card">
              <div class="settings-card-head">
                <h4>联调状态</h4>
                <span class="inline-status" id="settings-provider-line">接口：未检测</span>
              </div>

              <div class="diag-grid">
                <div class="diag-item">
                  <span class="diag-label">追踪号</span>
                  <strong id="trace-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">识别范围</span>
                  <strong id="settings-scope-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">接口状态</span>
                  <strong id="provider-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">前端版本</span>
                  <strong id="frontend-version-line">未检测</strong>
                </div>
              </div>
            </section>
          </section>
        </section>
      </section>
    </div>
    <script src="./taskpane-helpers.js?v=0.12.10-alpha"></script>
    <script src="./taskpane.js?v=0.12.10-alpha"></script>
  </body>
</html>
