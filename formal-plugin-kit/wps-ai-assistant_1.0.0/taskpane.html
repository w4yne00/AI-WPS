<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS AI 助理</title>
    <link rel="stylesheet" href="./taskpane.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-copy">
          <p class="eyebrow">WPS AI 助理</p>
          <h1 id="task-title">智能改写</h1>
        </div>
        <div id="top-toolbox" class="header-actions">
          <div id="health-indicator" class="badge badge-warn">检测中</div>
        </div>
      </header>

      <section id="home-view" class="view active">
        <section id="scope-strip" class="scope-strip">
          <span class="scope-pill-label">识别范围</span>
          <strong id="scope-line">未检测</strong>
        </section>

        <section class="controls">
          <div id="rewrite-options" class="mode-block">
            <div class="rewrite-grid">
              <label class="field">
                <span id="style-field-label">改写风格</span>
                <select id="rewrite-style">
                  <option value="default">默认正式</option>
                  <option value="formal">更正式</option>
                  <option value="structured">更有条理</option>
                  <option value="reporting">更像汇报材料</option>
                </select>
              </label>

              <label class="field">
                <span>侧重点</span>
                <select id="focus-point">
                  <option value="default">保持完整</option>
                  <option value="conclusion">突出结论</option>
                  <option value="risk">突出风险</option>
                  <option value="next_step">突出下一步</option>
                  <option value="implementation">突出实施路径</option>
                </select>
              </label>

              <label class="field">
                <span>篇幅</span>
                <select id="length-mode">
                  <option value="default">默认</option>
                  <option value="concise">精简</option>
                  <option value="same">保持篇幅</option>
                  <option value="expanded">适度扩写</option>
                </select>
              </label>
            </div>
          </div>

          <div id="template-options" class="mode-block compact-template" hidden>
            <label class="field">
              <span>文档模板</span>
              <select id="template-select"></select>
            </label>
          </div>

          <label id="instruction-block" class="field">
            <span>补充要求</span>
            <textarea id="user-instruction" rows="2" placeholder="例如：请突出风险和下一步计划，压缩到200字以内。"></textarea>
          </label>

          <div class="button-cluster">
            <button id="btn-run-primary" type="button">生成改写</button>
            <button id="btn-apply" class="secondary-action" type="button" disabled>应用预览</button>
          </div>

          <section class="status compact-status">
            <div id="status-line">等待操作。</div>
          </section>
        </section>

        <section class="panel result-panel">
          <div class="panel-head">
            <div>
              <p class="panel-eyebrow">输出</p>
              <h2>结果预览</h2>
            </div>
            <div class="result-tools">
              <span id="result-mode-chip" class="inline-status">等待运行</span>
              <button id="btn-copy-result" class="ghost-action icon-action" type="button" title="复制结果" aria-label="复制结果">⧉</button>
            </div>
          </div>
          <pre id="result-output">等待运行。</pre>
        </section>
      </section>

      <section id="settings-view" class="view">
        <section class="settings-shell">
          <header class="settings-head">
            <button id="btn-close-settings" class="back-button" type="button">‹ 返回</button>
            <div>
              <p class="panel-eyebrow">低频配置</p>
              <h2>设置</h2>
            </div>
          </header>

          <section id="connection-settings-section" class="settings-group">
            <div class="settings-group-title">
              <p class="panel-eyebrow">连接</p>
              <h3>连接设置</h3>
            </div>

            <section class="settings-card">
              <div class="settings-card-head">
                <div>
                  <p class="panel-eyebrow">认证</p>
                  <h4>企业接口密钥</h4>
                </div>
                <span id="provider-auth-line" class="inline-status">认证来源：未检测</span>
              </div>

              <label class="field">
                <span>导入企业接口密钥</span>
                <input id="provider-api-key" type="password" placeholder="粘贴企业接口密钥" />
              </label>

              <div class="button-row settings-actions">
                <button id="btn-save-api-key" type="button">保存密钥</button>
                <button id="btn-clear-api-key" class="secondary-action" type="button">清除密钥</button>
                <button id="btn-refresh" class="ghost-action" type="button">刷新配置</button>
              </div>
            </section>
          </section>

          <section id="diagnostics-section" class="settings-group">
            <div class="settings-group-title">
              <p class="panel-eyebrow">诊断</p>
              <h3>诊断</h3>
            </div>

            <section class="settings-card">
              <div class="settings-card-head">
                <div>
                  <p class="panel-eyebrow">运行时</p>
                  <h4>联调状态</h4>
                </div>
                <span class="inline-status" id="settings-provider-line">接口：未检测</span>
              </div>

              <div class="diag-grid">
                <div class="diag-item">
                  <span class="diag-label">追踪号</span>
                  <strong id="trace-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">识别范围</span>
                  <strong id="settings-scope-line">未检测</strong>
                </div>
                <div class="diag-item">
                  <span class="diag-label">接口状态</span>
                  <strong id="provider-line">未检测</strong>
                </div>
              </div>

              <div class="button-row settings-actions">
                <button id="btn-probe" class="secondary-action" type="button">运行探针</button>
              </div>
            </section>
          </section>
        </section>
      </section>
    </div>
    <script src="./taskpane-helpers.js"></script>
    <script src="./taskpane.js"></script>
  </body>
</html>
