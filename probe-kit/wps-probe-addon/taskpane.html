<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS Runtime Probe</title>
    <style>
      body {
        margin: 0;
        font-family: "Noto Sans SC", sans-serif;
        background: #f6f2e9;
        color: #1f1f1f;
      }
      .app {
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 12px;
        color: #4c4c4c;
      }
      button {
        border: none;
        background: #274b3d;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
      }
      pre {
        margin-top: 16px;
        background: #fffdf8;
        border: 1px solid #d6cab9;
        padding: 12px;
        white-space: pre-wrap;
        min-height: 180px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>WPS Runtime Probe</h1>
      <p>用于验证麒麟 V10 ARM 目标机上的 WPS 插件运行时能力与 localhost 通信能力。</p>
      <button id="run-probe" type="button">运行探针</button>
      <pre id="probe-output">等待运行。</pre>
    </div>
    <script src="./taskpane.js"></script>
  </body>
</html>
