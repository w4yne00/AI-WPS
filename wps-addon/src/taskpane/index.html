<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS AI Assistant</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>WPS AI Assistant</h1>
        <p id="status">Task pane shell loaded.</p>
      </header>
      <main>
        <section id="actions">
          <button type="button">Format Proofread</button>
          <button type="button">Auto Format</button>
          <button type="button">Rewrite / Continue</button>
        </section>
        <section id="results">
          <h2>Result Preview</h2>
          <div id="result-panel">Waiting for implementation.</div>
          <div id="result-actions">
            <button id="apply-button" type="button" disabled>Apply Preview</button>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./app.ts"></script>
  </body>
</html>
